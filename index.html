<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>归期知识问卷</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: rgb(65, 143, 222);
      --danger: #b91c1c;
      --ok: #166534;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #e8f5f4 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(65, 143, 222, 0.2);
      overflow: hidden;
    }
    .header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgb(65, 143, 222), rgb(54, 120, 188));
      color: #fff;
    }
    .header h1 { margin: 0; font-size: 24px; line-height: 1.3; }
    .header p { margin: 8px 0 0; opacity: 0.92; font-size: 14px; }
    .content { padding: 24px; }
    .status { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
    .question { font-size: 20px; line-height: 1.5; margin: 0 0 18px; font-weight: 700; }
    .options { display: grid; gap: 10px; margin-bottom: 22px; }
    .option {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      transition: 0.15s ease;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .option:hover { border-color: rgb(65, 143, 222); background: #eef5fd; }
    .option input { margin: 0; }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      background: var(--primary);
      color: #fff;
    }
    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      background: #fafafa;
    }
    .panel h2 { margin: 0 0 10px; }
    .panel p { margin: 0; color: var(--muted); }
    .fail h2 { color: var(--danger); }
    .success h2 { color: var(--ok); }
    .qr {
      margin-top: 16px;
      width: min(260px, 75vw);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: block;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <div class="header">
      <h1>归期知识问卷</h1>
      <p>规则：共 10 题，答错即结束；第1题为问答题，第6题为多选题，其余为单选题。</p>
    </div>

    <div class="content" id="quizView">
      <div class="status" id="statusText"></div>
      <h2 class="question" id="questionText"></h2>
      <form id="optionForm" class="options"></form>
      <button id="submitBtn" type="button">提交本题</button>
    </div>

    <div class="content hidden" id="failView">
      <div class="panel fail">
        <h2>答题结束</h2>
        <p id="failText"></p>
      </div>
    </div>

    <div class="content hidden" id="successView">
      <div class="panel success">
        <h2>全部答对，欢迎入群</h2>
        <p>请扫码加入群聊：</p>
        <img class="qr" src="assets/group-qr.png" alt="群聊二维码" />
      </div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "guiqi_quiz_session_locked_v1";

    const questions = [
      {
        type: "text",
        title: "1. 归期的本名叫什么？（问答题）",
        placeholder: "请输入答案",
        correct: "双小钧"
      },
      {
        type: "single",
        title: "2. 归期的生日是？",
        options: ["2005年3月22日", "2005年2月23日", "2005年3月23日", "2004年3月23日"],
        correct: "2005年3月23日"
      },
      {
        type: "single",
        title: "3. 归期登上 KPL 赛场的日子是？",
        options: ["2023年4月3日", "2023年4月2日", "2023年3月2日", "2022年4月2日"],
        correct: "2023年4月2日"
      },
      {
        type: "single",
        title: "4. 归期的本命英雄是？",
        options: ["曜", "镜", "澜", "影"],
        correct: "影"
      },
      {
        type: "single",
        title: "5. 归期喜欢小动物吗？",
        options: ["不喜欢", "喜欢", "一般", "偶尔喜欢"],
        correct: "不喜欢"
      },
      {
        type: "multi",
        title: "6. 归期不爱吃的蔬菜是？（多选题）",
        options: ["火龙果", "茄子", "蘑菇"],
        correct: ["蘑菇", "茄子"]
      },
      {
        type: "single",
        title: "7. 归期登场 KPL 后的第一个冠军是哪一年的什么比赛？",
        options: ["2023年KPL春季赛", "2023年王者荣耀挑战者杯", "2024年王者荣耀挑战者杯", "2022年世界冠军杯"],
        correct: "2023年王者荣耀挑战者杯"
      },
      {
        type: "single",
        title: "8. 归期登场 KPL 后的第二个冠军是哪一年的什么比赛？",
        options: ["2024年KPL夏季赛", "2023年KPL春季赛", "2024年KPL春季赛", "2024年王者荣耀挑战者杯"],
        correct: "2024年KPL春季赛"
      },
      {
        type: "single",
        title: "9. 归期的直播间房间号是？",
        options: ["286732", "268723", "286233", "286723"],
        correct: "286723"
      },
      {
        type: "single",
        title: "10. 归期在 KPL 赛场的五杀英雄是？",
        options: ["马超", "关羽", "曜", "澜"],
        correct: "关羽"
      }
    ];

    const defaultState = {
      index: 0,
      status: "in_progress", // in_progress | failed | passed
      failedAt: null
    };

    function readState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...defaultState };
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return { ...defaultState };
        if (!["in_progress", "failed", "passed"].includes(parsed.status)) return { ...defaultState };
        if (typeof parsed.index !== "number") return { ...defaultState };
        return {
          ...defaultState,
          ...parsed,
          index: Math.max(0, Math.min(parsed.index, questions.length))
        };
      } catch {
        return { ...defaultState };
      }
    }

    function writeState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    let state = readState();

    const quizView = document.getElementById("quizView");
    const failView = document.getElementById("failView");
    const successView = document.getElementById("successView");
    const statusText = document.getElementById("statusText");
    const questionText = document.getElementById("questionText");
    const optionForm = document.getElementById("optionForm");
    const submitBtn = document.getElementById("submitBtn");
    const failText = document.getElementById("failText");

    function showOnly(view) {
      [quizView, failView, successView].forEach(v => v.classList.add("hidden"));
      view.classList.remove("hidden");
    }

    function getTypeLabel(type) {
      if (type === "text") return "问答题";
      if (type === "multi") return "多选题";
      return "单选题";
    }

    function renderQuestion() {
      const q = questions[state.index];
      statusText.textContent = `第 ${state.index + 1} / ${questions.length} 题 · ${getTypeLabel(q.type)}`;
      questionText.textContent = q.title;
      optionForm.innerHTML = "";

      if (q.type === "text") {
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = q.placeholder || "请输入答案";
        input.id = `q${state.index}-text`;
        input.autocomplete = "off";
        input.style.width = "100%";
        input.style.padding = "12px 14px";
        input.style.border = "1px solid var(--border)";
        input.style.borderRadius = "12px";
        input.style.fontSize = "16px";
        optionForm.appendChild(input);
        return;
      }

      const inputType = q.type === "multi" ? "checkbox" : "radio";
      q.options.forEach((opt, i) => {
        const id = `q${state.index}-o${i}`;
        const label = document.createElement("label");
        label.className = "option";
        label.setAttribute("for", id);

        const input = document.createElement("input");
        input.type = inputType;
        input.name = `question-${state.index}`;
        input.value = opt;
        input.id = id;

        const span = document.createElement("span");
        span.textContent = opt;

        label.appendChild(input);
        label.appendChild(span);
        optionForm.appendChild(label);
      });
    }

    function getAnswer(q) {
      if (q.type === "text") {
        const textInput = optionForm.querySelector("input[type='text']");
        if (!textInput) return null;
        const value = textInput.value.trim();
        return value || null;
      }

      if (q.type === "multi") {
        const checked = [...optionForm.querySelectorAll("input[type='checkbox']:checked")].map(el => el.value);
        return checked.length ? checked : null;
      }

      const checked = optionForm.querySelector("input[type='radio']:checked");
      return checked ? checked.value : null;
    }

    function isCorrectAnswer(q, answer) {
      if (q.type === "text") {
        const normalize = text => String(text).replace(/\s+/g, "");
        return normalize(answer) === normalize(q.correct);
      }

      if (q.type === "multi") {
        if (!Array.isArray(answer)) return false;
        const expected = [...q.correct].sort();
        const actual = [...answer].sort();
        if (expected.length !== actual.length) return false;
        return expected.every((item, idx) => item === actual[idx]);
      }

      return answer === q.correct;
    }

    function renderByState() {
      if (state.status === "failed") {
        const failAt = (state.failedAt || 0) + 1;
        failText.textContent = `你在第 ${failAt} 题选择错误，本轮答题已结束。`;
        showOnly(failView);
        return;
      }

      if (state.status === "passed") {
        showOnly(successView);
        return;
      }

      if (state.index >= questions.length) {
        state.status = "passed";
        writeState();
        showOnly(successView);
        return;
      }

      showOnly(quizView);
      renderQuestion();
    }

    submitBtn.addEventListener("click", () => {
      if (state.status !== "in_progress") return;

      const current = questions[state.index];
      const answer = getAnswer(current);
      if (!answer) {
        alert(current.type === "text" ? "请先输入答案再提交。" : "请先选择答案再提交。");
        return;
      }

      if (!isCorrectAnswer(current, answer)) {
        state.status = "failed";
        state.failedAt = state.index;
        writeState();
        renderByState();
        return;
      }

      state.index += 1;
      if (state.index >= questions.length) {
        state.status = "passed";
      }
      writeState();
      renderByState();
    });

    renderByState();
  </script>
</body>
</html>
